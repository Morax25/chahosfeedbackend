# docker-compose.yml

services:
  redis:
    image: redis:7-alpine

    container_name: chaosfeed-redis

    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

volumes:
  redis_data: