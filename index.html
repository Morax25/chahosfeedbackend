<!DOCTYPE html>
<html>

<head>
    <title>Testing Websockets</title>
</head>

<body>
    <h1>Socket Test</h1>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script>
        const socket = io(
            "http://localhost:3000"
        )
        socket.on(
            "connect",
            () => {
                console.log(
                    "Connected:",
                    socket.id
                )
            }
        )
        socket.on(
            "online_users",
            (count) => {
                console.log(
                    "Online users:",
                    count
                )
            }
        )
    </script>
</body>

</html>
